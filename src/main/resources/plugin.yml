name: LuzPlugin
version: 1.0.0
main: com.newscraft.luzplugin.LuzPlugin
api-version: 1.20
description: Plugin de visao noturna - NewsCraft
author: NewsCraft

commands:
  luz:
    description: Ativa ou desativa a visao noturna
    usage: /luz
    permission: luzplugin.usar
    permission-message: "&cVoce nao tem permissao!"

permissions:
  luzplugin.usar:
    description: Permite usar o comando /luz
    default: false
